# Atlas V2 – Production Docker Compose
#
# Services:
#   postgres  – PostgreSQL 16 (persistent volume)
#   redis     – Redis 7 (session/queue)
#   backend   – FastAPI on :7411
#   frontend  – Next.js on :3000
#
# Quick start:
#   cp .env.example .env        # fill in API keys and secrets
#   docker compose up -d
#   docker compose exec backend python backend/storage/seeder.py

version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-atlas_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - atlas_net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - atlas_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - atlas_net

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: atlas-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL:   postgresql+asyncpg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas_secret}@postgres:5432/${POSTGRES_DB:-atlas_db}
      REDIS_URL:      redis://redis:6379/0
      ATLAS_HOST:     0.0.0.0
      ATLAS_PORT:     7411
    ports:
      - "${ATLAS_PORT:-7411}:7411"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./reports:/app/reports
      - ./workflows:/app/workflows
      - ./plugins:/app/plugins
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7411/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas_net

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ui-v2
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:7411/api}
    container_name: atlas-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:7411/api}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - atlas_net

volumes:
  atlas_pgdata:
    name: atlas_pgdata
  atlas_redis:
    name: atlas_redis

networks:
  atlas_net:
    name: atlas_net
    driver: bridge
