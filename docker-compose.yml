# Atlas V2 – Docker Compose Stack
# Usage: docker compose up -d
# Services: PostgreSQL, Redis, FastAPI Backend

version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-atlas_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - atlas_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: atlas-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas_secret}@postgres:5432/${POSTGRES_DB:-atlas_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${ATLAS_PORT:-7411}:7411"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./reports:/app/reports
      - ./workflows:/app/workflows
      - ./plugins:/app/plugins
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  atlas_pgdata:
  atlas_redis:
